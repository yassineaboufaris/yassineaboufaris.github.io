<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <span class="nav-logo" id="nav-domain"></span>
  <ul class="nav-links">
    <li><a href="#about">About</a></li>
    <li><a href="#experience">Exp</a></li>
    <li><a href="#projects">Work</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>
</nav>

<section class="hero" id="top">
  <p class="hero-label" id="hero-label"></p>
  <h1 id="hero-h1"></h1>
  <p class="hero-desc" id="hero-tagline"></p>
  <div class="hero-actions">
    <a href="#projects" class="btn btn-primary">Vedi i progetti</a>
    <a href="#contact" class="btn btn-secondary">Scrivimi</a>
  </div>
</section>

<section id="about">
  <p class="section-label">Chi sono</p>
  <p class="about-text" id="about-short"></p>
  <p class="about-muted" id="about-extended"></p>
  <div class="skills-grid" id="skills-grid"></div>
</section>

<section id="experience">
  <p class="section-label">Esperienza</p>
  <div class="timeline" id="timeline"></div>
</section>

<section id="projects">
  <p class="section-label">Progetti</p>
  <div class="projects-grid" id="projects-grid"></div>
</section>

<section id="contact">
  <p class="section-label">Contatti</p>
  <div class="contact-grid">
    <div>
      <div class="form-group">
        <label class="form-label">Nome</label>
        <input class="form-input" type="text" placeholder="Il tuo nome">
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" placeholder="email@esempio.it">
      </div>
      <div class="form-group">
        <label class="form-label">Messaggio</label>
        <textarea class="form-input" rows="4" placeholder="Di cosa hai bisogno?"></textarea>
      </div>
      <button class="btn btn-primary" style="width: 100%;">Invia messaggio</button>
    </div>
    <div>
      <p id="availability-line" style="font-size: 14px; color: var(--muted); line-height: 1.7; margin-bottom: 1.5rem;"></p>
      <div class="social-links" id="social-links"></div>
    </div>
  </div>
</section>

<footer>
  <span class="footer-text" id="footer-name"></span>
  <span class="footer-text" id="footer-location"></span>
</footer>

<script src="main.js"></script>
</body>
</html>
